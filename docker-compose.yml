services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autopilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-autopilot}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autopilot} -d ${POSTGRES_DB:-autopilot}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    container_name: backend
    build: ./backend
    env_file:
      - path: .env
        required: false   # copy .env.example -> .env; the stack still starts without it
    volumes:
      # Your SSH private key(s). Put your .pem in ./keys (git-ignored).
      - ./keys:/keys:ro
    extra_hosts:
      # Lets the container reach a Phoenix mock running on the host, if you run one.
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - techbold

  frontend:
    container_name: frontend
    build:
      context: frontend
      dockerfile: src/docker/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    networks:
      - techbold

networks:
  techbold:
    driver: bridge

services:
  backend:
    container_name: backend
    build: ./backend
    env_file:
      - path: .env
        required: false   # copy .env.example -> .env; the stack still starts without it
    volumes:
      # Your SSH private key(s). Put your .pem in ./keys (git-ignored).
      - ./keys:/keys:ro
    extra_hosts:
      # Lets the container reach a Phoenix mock running on the host, if you run one.
      - "host.docker.internal:host-gateway"
    networks:
      - techbold

  frontend:
    container_name: frontend
    build:
      context: frontend
      dockerfile: src/docker/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - techbold

networks:
  techbold:
    driver: bridge
